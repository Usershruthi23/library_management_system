<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Issue Book</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body class="bg-yellow fade-in">
  <div class="container">
    <h2>📤 Issue Book</h2>
    <img src="https://cdn-icons-png.flaticon.com/512/1055/1055646.png" class="icon" alt="Issue Icon">
    <form id="issueBookForm">
      <label>Book ID:</label><input type="text" id="issueId" required><br>
      <label>Issued To:</label><input type="text" id="issuedTo" required><br>
      <button type="submit" class="glow-btn">Issue</button>
      <a href="index.html" class="glow-btn">← Back</a>
    </form>
  </div>
</body>
</html>
