<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Book</title>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body class="bg-orange fade-in">
  <div class="container">
    <h2>➕ Add Books</h2>
    <img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" class="icon" alt="Book Icon">
    <form id="addBookForm">
      <label>Book ID:</label><input type="text" id="bookId" required><br>
      <label>Title:</label><input type="text" id="title" required><br>
      <label>Author:</label><input type="text" id="author" required><br>
      <label>Status:</label><input type="text" id="status" value="Available"><br>
      <button type="submit" class="glow-btn">Submit</button>
      <a href="index.html" class="glow-btn">← Back</a>
    </form>
  </div>
</body>
</html>
